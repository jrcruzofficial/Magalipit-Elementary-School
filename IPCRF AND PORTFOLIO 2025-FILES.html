<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>File Viewer</title>
<style>
   html {
      font-size: 16px;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: column;
      gap: 1.25rem;
      padding: 2vh 5vw;
      background-color: green;
      min-height: 100vh;

      /* Center and limit width on large screens */
      max-width: 1200px;
      margin: 0 auto;
    }

    .file-list {
      width: 100%;
      max-width: 150px;
    }

    .file-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
  
    }

    .file-list li {
      margin-bottom: 0.3125rem;
    }

    .file-list a {
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .file-list a:hover {
      text-decoration: underline;
      text-decoration-color: white;
    }

    .file-list img {
      height: 3.125rem;
      width: auto;
      max-width: 100%;
      position: relative;
    }

    .file-list h3 {
      color: white;
      font-size: 1rem;
    }

    iframe {
      flex-grow: 1;
      width: 100%;
      height: 80vh;
      border: 2px solid white;
      border-radius: 6px;
      max-height: 90vh;
  
    }

    /* For small screens (phones) */
    @media (max-width: 600px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
        
      }

      .file-list {
        width: 100%;
        max-width: none;
        
      }

      iframe {
        height: 100vh;
      }

      .file-list img {
        width: 4rem;
        height: auto;
      }
    }

    /* For tablets and medium desktops */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
      }

      .file-list {
        width: 100%;
      }

      iframe {
        height: 100vh;
        
      }
    }

    /* For very large screens (ultrawide) */
    @media (min-width: 1600px) {
      body {
        padding: 5vh;
        
      }

      .file-list {
        width: 100%;
       
      }

      iframe {
        height: 100vh;
    
      }
    }


</style>
</head>
<body>

<div class="file-list">
  <ul class="top">
    <li class="back-button">
      <a href="FILES-SECTION.html">
        <img src="back.png" alt="Back">
      </a>
    </li>
  </ul>
  <img src="toppng.com-deped-logo-high-resolution-dep-ed-logo-3106x1573.png" alt="DepEd Logo" class="logo">
  <h3 style="color: white;">IPCRF AND PORTFOLIO 2025 </h3>
  <ul>
    <li><a href="#" onclick="loadFile('https://docs.google.com/presentation/d/1BxPUogiz4FQ7Q-r80iMpxo_EhpXSdTCj/edit?usp=drive_link')">CHIQUE D. ISON.pptx</a></li>
    <li><a href="#" onclick="loadFile('https://drive.google.com/file/d/1iXESRMujobjb5UKWbHN9g1IR7X90GS0h/view?usp=drive_link')">CHIQUE D. ISON.xlsm</a></li>
    <li><a href="#" onclick="loadFile('https://docs.google.com/spreadsheets/d/1svq9MOIye6fGXnlgptwDjrmJqtnHfxuo/edit?usp=drive_link')">DELA CRUZ.xlsm</a></li>
    <li><a href="#" onclick="loadFile('https://docs.google.com/presentation/d/10vJDXdmXnCvT5PMQHUCQuzjMkh7D1l5s/edit?usp=drive_link')">JEAN.pptx</a></li>
    <li><a href="#" onclick="loadFile('https://docs.google.com/spreadsheets/d/17xj4Oiv_lfjKwt41FjJoxDrm3p6UHLhF/edit?usp=drive_link')">NOREPHINE GABASA.xlsm</a></li>
    <li><a href="#" onclick="loadFile('https://docs.google.com/spreadsheets/d/1taQ9KoB9n0cja1H8B5RU_39ZgSXeKQKV/edit?usp=drive_link')">ROSLYN O. SANGYAHON.xlsm</a></li>
    <li><a href="#" onclick="loadFile('https://docs.google.com/presentation/d/17UFnsv9wvdT6v_roW4CzXypPrb3TdDHk/edit?usp=drive_link')">ROSLYN O. SANGYAHON.pptx</a></li>

  </ul>
</div>

<iframe id="fileViewer" src="" width="640" height="480"></iframe>

<script>
  function loadFile(url) {
    event.preventDefault();
    document.getElementById('fileViewer').src = url;
  }
</script>

</body>
</html>
