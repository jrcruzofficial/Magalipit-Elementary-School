<!DOCTYPE html>

<title>File Viewer</title>
<style>
   html {
      font-size: 16px;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: column;
      gap: 1.25rem;
      padding: 2vh 5vw;
      background-color: green;
      min-height: 100vh;

      /* Center and limit width on large screens */
      max-width: 1200px;
      margin: 0 auto;
    }

    .file-list {
      width: 100%;
      max-width: 150px;
    }

    .file-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
  
    }

    .file-list li {
      margin-bottom: 0.3125rem;
    }

    .file-list a {
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .file-list a:hover {
      text-decoration: underline;
      text-decoration-color: white;
    }

    .file-list img {
      height: 3.125rem;
      width: auto;
      max-width: 100%;
      position: relative;
    }

    .file-list h3 {
      color: white;
      font-size: 1rem;
    }

    iframe {
      flex-grow: 1;
      width: 100%;
      height: 80vh;
      border: 2px solid white;
      border-radius: 6px;
      max-height: 90vh;
  
    }

    /* For small screens (phones) */
    @media (max-width: 600px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
        
      }

      .file-list {
        width: 100%;
        max-width: none;
        
      }

      iframe {
        height: 100vh;
      }

      .file-list img {
        width: 4rem;
        height: auto;
      }
    }

    /* For tablets and medium desktops */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
      }

      .file-list {
        width: 100%;
      }

      iframe {
        height: 100vh;
        
      }
    }

    /* For very large screens (ultrawide) */
    @media (min-width: 1600px) {
      body {
        padding: 5vh;
        
      }

      .file-list {
        width: 100%;
       
      }

      iframe {
        height: 100vh;
    
      }
    }
</style>
