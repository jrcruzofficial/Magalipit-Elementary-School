<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Viewer</title>
  <style>
    html {
      font-size: 16px;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: column;
      gap: 1.25rem;
      padding: 2vh 5vw;
      background-color: green;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
    }

    .file-list {
      width: 100%;
      max-width: 15.625rem; /* 250px */
    }

    .file-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .file-list li {
      margin-bottom: 0.3125rem;
    }

    .file-list a {
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .file-list a:hover {
      text-decoration: underline;
      text-decoration-color: white;
    }

    .file-list img {
      height: 2.5rem; /* 40px */
      width: auto;
    }

    h3 {
      color: white;
      font-size: 1rem;
    }

    iframe {
      flex-grow: 1;
      width: 100%;
      height: 80vh;
      border: 0.125rem solid white;
      border-radius: 0.375rem;
      max-height: 90vh;
    }

    /* Responsive: Small screens */
    @media (max-width: 600px) {
      body {
        flex-direction: row;
        padding: 5vh 5vw;
      }

      .file-list {
        max-width: none;
        width: 100%;
      }

      iframe {
        height: 100vh;
      }

      .file-list img {
        width: 4rem;
        height: auto;
      }
    }

    /* Medium screens (tablets) */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
        padding: 5vh 5vw;
      }

      .file-list {
        width: 100%;
        max-width: 15.625rem;
      }

      iframe {
        height: 100vh;
      }
    }

    /* Large screens */
    @media (min-width: 1600px) {
      body {
        padding: 5vh;
      }

      iframe {
        height: 100vh;
      }
    }
  </style>
</head>
<body>

  <div class="file-list">
    <ul style="position: relative; bottom: 2.5vh;">
      <li>
        <a href="FILES-SECTION.html">
          <img src="back.png" alt="Back Button" style="position: relative; bottom: 0.3125rem; right: 0.625rem;">
        </a>
      </li>
    </ul>

    <img src="toppng.com-deped-logo-high-resolution-dep-ed-logo-3106x1573.png" alt="DepEd Logo" style="height: 3.125rem; width: 5rem;">
    <h3>DLL-FILES</h3>

    <ul>
      <li><a href="DLL WEEK 2 GRADE 1-BALITE.html">DLL WEEK 2 GRADE 1-BALITE</a></li>
      <li><a href="QUARTER 1.html">QUARTER 1</a></li>
      <li><a href="#" onclick="loadFile('https://drive.google.com/file/d/1C70B9cOusrYqvBCOyOcZLCDn9Z2GSxKP/view?usp=drive_link')">DO_s2016_042.pdf</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1sHmxqf66GPdahXfUkewrO5lmYx0BTR3KqBfYCW_ED04/edit')">GRADE 1 TO 12 DLL TEMPLATE (ENGLISH)</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1fcTEm5PmGHXIBLdlUjtugVUjoZnvVMl3ewGzoMAVQZI/edit')">GRADE 1 TO 12 DLL TEMPLATE (ENGLISH)</a></li>
    </ul>
  </div>

  <iframe id="fileViewer" src="" title="Document Viewer"></iframe>

  <script>
    function loadFile(url) {
      event.preventDefault();
      document.getElementById('fileViewer').src = url;
    }
  </script>

</body>
</html>
