<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Viewer</title>
  <style>
    html {
      font-size: 16px;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: column;
      gap: 1.25rem;
      padding: 2vh 5vw;
      background-color: green;
      min-height: 100vh;

      /* Center and limit width on large screens */
      max-width: 1200px;
      margin: 0 auto;
    }

    .file-list {
      width: 100%;
      max-width: 150px;
    }

    .file-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
  
    }

    .file-list li {
      margin-bottom: 0.3125rem;
    }

    .file-list a {
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .file-list a:hover {
      text-decoration: underline;
      text-decoration-color: white;
    }

    .file-list img {
      height: 3.125rem;
      width: auto;
      max-width: 100%;
      position: relative;
    }

    .file-list h3 {
      color: white;
      font-size: 1rem;
    }

    iframe {
      flex-grow: 1;
      width: 100%;
      height: 80vh;
      border: 2px solid white;
      border-radius: 6px;
      max-height: 90vh;
  
    }

    /* For small screens (phones) */
    @media (max-width: 600px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
        
      }

      .file-list {
        width: 100%;
        max-width: none;
        
      }

      iframe {
        height: 100vh;
      }

      .file-list img {
        width: 4rem;
        height: auto;
      }
    }

    /* For tablets and medium desktops */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
         padding: 5vh 5vw;
      }

      .file-list {
        width: 100%;
      }

      iframe {
        height: 100vh;
        
      }
    }

    /* For very large screens (ultrawide) */
    @media (min-width: 1600px) {
      body {
        padding: 5vh;
        
      }

      .file-list {
        width: 100%;
       
      }

      iframe {
        height: 100vh;
    
      }
    }
  </style>
</head>
<body>

  <div class="file-list">
    <ul style="position: relative; bottom: 2.5vh;">
      <li>
        <a href="FILES-SECTION.html">
          <img src="back.png" alt="Back Button">
        </a>
      </li>
    </ul>

    <img src="toppng.com-deped-logo-high-resolution-dep-ed-logo-3106x1573.png" alt="DepEd Logo">
    
    <h3>ACTION PLAN-FILES</h3>
    
    <ul>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1c0-7jIZY_ppfIKDyBWuFEXk2DoDWKIlF/edit')">CHIQUE D. ISON</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1c0-7jIZY_ppfIKDyBWuFEXk2DoDWKIlF/edit')">ROSELYN SANGYAHON</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/16pPXc0OfEKd-vYVbF09Y7WZm55B3045g/edit')">MATY JOY VILLARUEL</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1mLGXmIndr2yACI0nS__DWru9XgFrWNCH/edit')">SPORTS</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/19L7PNKQmEmBbX4SmUgjtES8KtdZBO9m5mYl1gdNS7VY/edit')">TEMPLATE</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1JZroZ1NeUnLd-8SWNDbrRTqIzBEUlnlf/edit')">SYMPHONY ACTION PLAN 2025-2026</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1g_ZvhIxNsBLj1yqxEJ3-okZdxjqXCwPn/edit')">SYMPHONY</a></li>
      <li><a href="#" onclick="loadFile('https://docs.google.com/document/d/1qoEKHn7lbl-VkeLOoGize79QdmYgrOs9/edit')">YES-O ACTION PLAN 2025-2026</a></li>
      
    </ul>
  </div>

  <iframe id="fileViewer" src="" title="Document Viewer"></iframe>

  <script>
    function loadFile(url) {
      event.preventDefault();
      document.getElementById('fileViewer').src = url;
    }

    AOS.init();
  </script>

</body>
</html>
